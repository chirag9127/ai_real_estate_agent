<!DOCTYPE html>
<html>
<head><meta charset="utf-8"></head>
<body style="margin:0;padding:0;font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,sans-serif;color:#1a1a1a;background-color:#fafafa;">
  <div style="max-width:600px;margin:0 auto;padding:20px;">
    <div style="border-bottom:3px solid #ff5e25;padding-bottom:12px;margin-bottom:24px;">
      <h1 style="margin:0;font-size:22px;color:#ff5e25;">
        {subject_line}
      </h1>
    </div>

    <p style="font-size:15px;line-height:1.6;">Hey {client_name}!</p>

    <p style="font-size:15px;line-height:1.6;">{custom_body}</p>

    <table style="width:100%;border-collapse:collapse;margin:24px 0;border:1px solid #e0e0e0;border-radius:6px;">
      {listing_rows}
    </table>

    <p style="font-size:15px;line-height:1.6;">
      Let me know what jumps out at you — happy to schedule tours
      whenever you're free. No rush, just don't want you to miss out!
    </p>

    <p style="font-size:15px;line-height:1.6;margin-top:24px;">
      Cheers,<br>
      <strong>{agent_name}</strong>
    </p>
    <div style="font-size:13px;color:#555;line-height:1.5;margin-top:4px;">
      {agent_phone}
      {agent_email}
      {brokerage_name}
    </div>

    <div style="border-top:1px solid #e0e0e0;margin-top:32px;padding-top:16px;text-align:center;font-size:11px;color:#999;">
      {brokerage_name}
      {brokerage_logo_url}
    </div>
  </div>
</body>
</html>
